name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - ".github/workflows/deploy-pages.yml"
    paths-ignore:
      # scrape-daily.yml が properties.json を自前で deploy するため、
      # データ更新 push で deploy-pages.yml が起動すると concurrency 衝突で
      # scrape の Deploy が cancel される（NFR-003 阻害要因）。
      - "static/data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
