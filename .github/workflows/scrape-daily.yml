name: Daily Scrape

on:
  schedule:
    # 毎日 JST 6:00 (UTC 21:00) に実行
    - cron: "0 21 * * *"
  workflow_dispatch:  # 手動実行も可能
    inputs:
      city:
        description: "City filter (empty = all wards)"
        required: false
        default: ""

permissions:
  contents: write  # data.json を commit するために必要

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          CITY_FILTER: ${{ github.event.inputs.city }}
        run: |
          if [ -n "$CITY_FILTER" ]; then
            python scrape.py --city "$CITY_FILTER"
          else
            python scrape.py
          fi

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add static/data/properties.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Trigger Pages deploy
        if: success()
        run: gh workflow run deploy-pages.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
