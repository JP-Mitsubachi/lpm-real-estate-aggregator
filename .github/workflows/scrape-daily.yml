name: Daily Scrape

on:
  schedule:
    # 毎日 JST 6:00 (UTC 21:00) に実行
    - cron: "0 21 * * *"
  workflow_dispatch:  # 手動実行も可能
    inputs:
      city:
        description: "City filter (empty = all wards)"
        required: false
        default: ""

permissions:
  contents: write  # data.json を commit するために必要
  pages: write     # GitHub Pages にデプロイするために必要
  id-token: write  # Pages デプロイの OIDC 認証に必要

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Pages デプロイ URL をジョブ環境として公開
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          CITY_FILTER: ${{ github.event.inputs.city }}
          # v2.4: AI 根拠生成（Claude Haiku 4.5）。secret 未設定なら scrape.py 側で自動 fallback
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-haiku-4-5-20251001
        run: |
          if [ -n "$CITY_FILTER" ]; then
            python scrape.py --city "$CITY_FILTER" --with-ai
          else
            python scrape.py --with-ai
          fi

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add static/data/properties.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # deploy-pages.yml への workflow_dispatch は GITHUB_TOKEN では 403 になり、
      # かつ bot push は deploy-pages.yml の push トリガーを発火しない（GH 無限ループ防止仕様）。
      # そのため scrape 完了後に同一ジョブ内で Pages デプロイを直接実行する。
      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
